<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sổ 7 hũ</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💰</text></svg>" />

<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
  html, body { margin: 0; padding: 0; }
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #FAF7F0;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  @media (max-width: 640px) {
    .jarsGrid { grid-template-columns: repeat(2, 1fr) !important; }
    .summaryGrid { grid-template-columns: 1fr 1fr !important; }
  }
</style>
</head>
<body>

<div id="root"></div>

<script type="text/babel" data-presets="react,env">
const { useState, useMemo, useEffect, useRef } = React;

/* ---------- Icon set (inline SVG, no external dependency) ---------- */
const ICON_PATHS = {
  wallet: <><path d="M21 12V7H5a2 2 0 0 1 0-4h14v4"/><path d="M3 5v14a2 2 0 0 0 2 2h16v-5"/><path d="M18 12a2 2 0 0 0 0 4h4v-4Z"/></>,
  calendar: <><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></>,
  'bar-chart-3': <><path d="M3 3v18h18"/><path d="M18 17V9"/><path d="M13 17V5"/><path d="M8 17v-3"/></>,
  download: <><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></>,
  'loader-2': <path d="M21 12a9 9 0 1 1-6.219-8.56"/>,
  check: <polyline points="20 6 9 17 4 12"/>,
  'minus-circle': <><circle cx="12" cy="12" r="10"/><line x1="8" y1="12" x2="16" y2="12"/></>,
  'plus-circle': <><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></>,
  'trash-2': <><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></>,
  'trending-up': <><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></>,
  x: <><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></>,
};
function Icon({ name, size = 16, color = 'currentColor', strokeWidth = 1.8, style }) {
  return (
    <svg
      width={size} height={size} viewBox="0 0 24 24" fill="none"
      stroke={color} strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round"
      style={{ display: 'inline-block', flexShrink: 0, verticalAlign: 'middle', ...style }}
    >
      {ICON_PATHS[name] || null}
    </svg>
  );
}

/* ---------- Local storage helpers (replaces window.storage) ---------- */
const LS_KEY = 'so7hu_transactions';
const storage = {
  get: async () => {
    try {
      const raw = localStorage.getItem(LS_KEY);
      return raw ? { value: raw } : null;
    } catch (e) { return null; }
  },
  set: async (value) => {
    try {
      localStorage.setItem(LS_KEY, value);
      return { value };
    } catch (e) { return null; }
  },
};

const JARS = [
  { key: 'daily', label: 'Chi tiêu hàng ngày', color: '#B45309', bg: '#FEF3E2', ring: '#FDE0B0', isDaily: true },
  { key: 'savings', label: 'Tiết kiệm', percent: 30, color: '#0F6E56', bg: '#E1F5EE', ring: '#9FE1CB' },
  { key: 'invest', label: 'Đầu tư bản thân', percent: 30, color: '#185FA5', bg: '#E6F1FB', ring: '#85B7EB' },
  { key: 'family', label: 'Ma chay cưới hỏi', percent: 15, color: '#993556', bg: '#FBEAF0', ring: '#ED93B1' },
  { key: 'spend', label: 'Chi tiêu', percent: 20, color: '#993C1D', bg: '#FAECE7', ring: '#F0997B' },
  { key: 'charity', label: 'Từ thiện', percent: 5, color: '#534AB7', bg: '#EEEDFE', ring: '#AFA9EC' },
  { key: 'other', label: 'Khác', color: '#5F5E5A', bg: '#F1EFE8', ring: '#B4B2A9', isTotal: true },
];

const INCOME_SOURCES = ['Lương', 'Thưởng', 'Làm thêm', 'Khác'];

function uid() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
}
function fmt(n) {
  const v = Math.round(n || 0);
  return v.toLocaleString('vi-VN') + 'đ';
}
function todayStr() {
  const d = new Date();
  return d.toISOString().slice(0, 10);
}
function monthKey(dateStr) { return dateStr.slice(0, 7); }
function yearKey(dateStr) { return dateStr.slice(0, 4); }

function BudgetApp() {
  const [transactions, setTransactions] = useState([]);
  const [tab, setTab] = useState('home');
  const [modal, setModal] = useState(null);
  const [loaded, setLoaded] = useState(false);
  const [saveState, setSaveState] = useState('idle');
  const saveTimer = useRef(null);

  useEffect(() => {
    let cancelled = false;
    (async () => {
      try {
        const result = await storage.get();
        if (!cancelled) {
          const list = result && result.value ? JSON.parse(result.value) : [];
          setTransactions(Array.isArray(list) ? list : []);
        }
      } catch (e) {
      } finally {
        if (!cancelled) setLoaded(true);
      }
    })();
    return () => { cancelled = true; };
  }, []);

  useEffect(() => {
    if (!loaded) return;
    setSaveState('saving');
    if (saveTimer.current) clearTimeout(saveTimer.current);
    saveTimer.current = setTimeout(async () => {
      try {
        const result = await storage.set(JSON.stringify(transactions));
        setSaveState(result ? 'saved' : 'error');
      } catch (e) {
        setSaveState('error');
      }
    }, 400);
    return () => { if (saveTimer.current) clearTimeout(saveTimer.current); };
  }, [transactions, loaded]);

  const balances = useMemo(() => {
    const b = {};
    JARS.forEach(j => (b[j.key] = 0));
    transactions.forEach(t => {
      if (t.type === 'income') {
        Object.entries(t.allocations).forEach(([k, v]) => {
          b[k] = (b[k] || 0) + v;
        });
      } else {
        b[t.jar] = (b[t.jar] || 0) - t.amount;
      }
    });
    return b;
  }, [transactions]);

  const walletTotal = (balances.daily || 0) + (balances.savings || 0) + (balances.invest || 0) + (balances.family || 0) + (balances.spend || 0) + (balances.charity || 0);

  function addIncome({ source, customLabel, amount, dailyAmount, date, note }) {
    const total = amount;
    const daily = Math.min(dailyAmount, total);
    const rest = total - daily;
    const allocations = {
      daily: daily,
      other: rest,
      savings: rest * 0.3,
      invest: rest * 0.3,
      family: rest * 0.15,
      spend: rest * 0.2,
      charity: rest * 0.05,
    };
    const tx = {
      id: uid(),
      type: 'income',
      source: source === 'Khác' ? (customLabel || 'Khác') : source,
      amount: total,
      date,
      note,
      allocations,
    };
    setTransactions(prev => [tx, ...prev]);
  }

  function addExpense({ jar, amount, date, note }) {
    const tx = { id: uid(), type: 'expense', jar, amount, date, note };
    setTransactions(prev => [tx, ...prev]);
  }

  function removeTx(id) {
    setTransactions(prev => prev.filter(t => t.id !== id));
  }

  function exportExcel() {
    const jarLabel = (key) => JARS.find(j => j.key === key)?.label || key;

    const txRows = [...transactions]
      .sort((a, b) => (a.date < b.date ? -1 : a.date > b.date ? 1 : 0))
      .map(t => ({
        'Ngày': formatDateVN(t.date),
        'Loại': t.type === 'income' ? 'Thu nhập' : 'Chi tiêu',
        'Nguồn / Hũ': t.type === 'income' ? t.source : jarLabel(t.jar),
        'Số tiền': t.amount,
        'Ghi chú': t.note || '',
      }));

    const jarRows = JARS.map(j => ({
      'Hũ': j.label,
      'Tỉ lệ': j.percent ? `${j.percent}%` : '',
      'Số dư hiện tại': Math.round(balances[j.key] || 0),
    }));

    const monthMap = {};
    transactions.forEach(t => {
      const k = monthKey(t.date);
      if (!monthMap[k]) monthMap[k] = { income: 0, expense: 0 };
      if (t.type === 'income') monthMap[k].income += t.amount; else monthMap[k].expense += t.amount;
    });
    const monthRows = Object.entries(monthMap)
      .sort((a, b) => (a[0] < b[0] ? -1 : 1))
      .map(([k, v]) => ({
        'Tháng': formatGroupKey(k, 'month'),
        'Thu nhập': Math.round(v.income),
        'Chi tiêu': Math.round(v.expense),
        'Chênh lệch': Math.round(v.income - v.expense),
      }));

    const wb = XLSX.utils.book_new();
    const wsTx = XLSX.utils.json_to_sheet(txRows);
    wsTx['!cols'] = [{ wch: 12 }, { wch: 10 }, { wch: 22 }, { wch: 14 }, { wch: 30 }];
    XLSX.utils.book_append_sheet(wb, wsTx, 'Giao dịch');

    const wsJar = XLSX.utils.json_to_sheet(jarRows);
    wsJar['!cols'] = [{ wch: 22 }, { wch: 8 }, { wch: 16 }];
    XLSX.utils.book_append_sheet(wb, wsJar, 'Số dư các hũ');

    const wsMonth = XLSX.utils.json_to_sheet(monthRows);
    wsMonth['!cols'] = [{ wch: 14 }, { wch: 14 }, { wch: 14 }, { wch: 14 }];
    XLSX.utils.book_append_sheet(wb, wsMonth, 'Tổng hợp theo tháng');

    const today = todayStr();
    XLSX.writeFile(wb, `so-7-hu-${today}.xlsx`);
  }

  if (!loaded) {
    return (
      <div style={{ ...styles.app, display: 'flex', alignItems: 'center', justifyContent: 'center', minHeight: 400 }}>
        <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 10, color: '#8A8478' }}>
          <Icon name="loader-2" size={24} strokeWidth={1.8} style={{ animation: 'spin 1s linear infinite' }} />
          <span style={{ fontSize: 13 }}>Đang tải dữ liệu đã lưu...</span>
        </div>
      </div>
    );
  }

  return (
    <div style={styles.app}>
      <header style={styles.header}>
        <div style={styles.headerInner}>
          <div style={styles.brandRow}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
              <Icon name="wallet" size={22} color="#B45309" strokeWidth={1.8} />
              <span style={styles.brandText}>Sổ 7 hũ</span>
            </div>
            <div style={styles.headerActions}>
              <SaveIndicator state={saveState} />
              <button onClick={exportExcel} style={{ ...styles.exportBtn, ...(transactions.length === 0 ? styles.exportBtnDisabled : {}) }} disabled={transactions.length === 0}>
                <Icon name="download" size={14} strokeWidth={1.8} />
                Xuất Excel
              </button>
            </div>
          </div>
          <div style={styles.totalWrap}>
            <span style={styles.totalLabel}>Tổng số dư</span>
            <span style={styles.totalValue}>{fmt(walletTotal)}</span>
          </div>
        </div>
      </header>

      <nav style={styles.tabBar}>
        <TabButton icon={<Icon name="wallet" size={16} strokeWidth={1.8} />} label="Hũ tiền" active={tab === 'home'} onClick={() => setTab('home')} />
        <TabButton icon={<Icon name="calendar" size={16} strokeWidth={1.8} />} label="Lịch sử" active={tab === 'history'} onClick={() => setTab('history')} />
        <TabButton icon={<Icon name="bar-chart-3" size={16} strokeWidth={1.8} />} label="Tổng hợp" active={tab === 'summary'} onClick={() => setTab('summary')} />
      </nav>

      <main style={styles.main}>
        {tab === 'home' && <HomeView balances={balances} />}
        {tab === 'history' && <HistoryView transactions={transactions} onRemove={removeTx} />}
        {tab === 'summary' && <SummaryView transactions={transactions} />}
      </main>

      <div style={styles.fabRow}>
        <button style={{ ...styles.fab, ...styles.fabExpense }} onClick={() => setModal('expense')}>
          <Icon name="minus-circle" size={18} strokeWidth={2} />
          Chi tiêu
        </button>
        <button style={{ ...styles.fab, ...styles.fabIncome }} onClick={() => setModal('income')}>
          <Icon name="plus-circle" size={18} strokeWidth={2} />
          Thu nhập
        </button>
      </div>

      {modal === 'income' && (
        <IncomeModal onClose={() => setModal(null)} onSubmit={(data) => { addIncome(data); setModal(null); }} />
      )}
      {modal === 'expense' && (
        <ExpenseModal balances={balances} onClose={() => setModal(null)} onSubmit={(data) => { addExpense(data); setModal(null); }} />
      )}
    </div>
  );
}

function SaveIndicator({ state }) {
  if (state === 'saving') {
    return (
      <span style={styles.saveIndicator}>
        <Icon name="loader-2" size={12} strokeWidth={2} style={{ animation: 'spin 1s linear infinite' }} />
        Đang lưu
      </span>
    );
  }
  if (state === 'saved') {
    return (
      <span style={{ ...styles.saveIndicator, color: '#0F6E56' }}>
        <Icon name="check" size={12} strokeWidth={2} />
        Đã lưu
      </span>
    );
  }
  if (state === 'error') {
    return <span style={{ ...styles.saveIndicator, color: '#993C1D' }}>Lưu lỗi, thử lại</span>;
  }
  return null;
}

function TabButton({ icon, label, active, onClick }) {
  return (
    <button onClick={onClick} style={{ ...styles.tabBtn, ...(active ? styles.tabBtnActive : {}) }}>
      {icon}
      <span>{label}</span>
    </button>
  );
}

function HomeView({ balances }) {
  return (
    <div>
      <div className="jarsGrid" style={styles.jarsGrid}>
        {JARS.map(j => (
          <div key={j.key} style={{ ...styles.jarCard, background: j.bg, borderColor: j.ring }}>
            <div style={{ ...styles.jarDot, background: j.color }} />
            <div style={styles.jarLabel}>{j.label}</div>
            {j.percent ? <div style={styles.jarPercent}>{j.percent}% phần "Khác"</div> : <div style={styles.jarPercent}>&nbsp;</div>}
            <div style={{ ...styles.jarAmount, color: j.color }}>{fmt(balances[j.key])}</div>
          </div>
        ))}
      </div>
      <p style={styles.hint}>
        Hũ "Khác" = Thu nhập − Chi tiêu hàng ngày đã khai báo. 5 hũ Tiết kiệm, Đầu tư, Ma chay, Chi tiêu, Từ thiện được chia ra từ hũ "Khác" theo tỉ lệ cố định.
      </p>
    </div>
  );
}

function HistoryView({ transactions, onRemove }) {
  if (transactions.length === 0) {
    return <EmptyState text="Chưa có giao dịch nào. Nhấn “Thu nhập” hoặc “Chi tiêu” bên dưới để bắt đầu." />;
  }
  const sorted = [...transactions].sort((a, b) => (a.date < b.date ? 1 : a.date > b.date ? -1 : 0));
  const groups = {};
  sorted.forEach(t => {
    groups[t.date] = groups[t.date] || [];
    groups[t.date].push(t);
  });

  return (
    <div>
      {Object.entries(groups).map(([date, txs]) => (
        <div key={date} style={{ marginBottom: '1.5rem' }}>
          <div style={styles.dateHeader}>{formatDateVN(date)}</div>
          {txs.map(t => (
            <div key={t.id} style={styles.txRow}>
              <div style={{ ...styles.txIcon, background: t.type === 'income' ? '#E1F5EE' : '#FAECE7', color: t.type === 'income' ? '#0F6E56' : '#993C1D' }}>
                {t.type === 'income' ? <Icon name="plus-circle" size={16} strokeWidth={2} /> : <Icon name="minus-circle" size={16} strokeWidth={2} />}
              </div>
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={styles.txTitle}>
                  {t.type === 'income' ? t.source : JARS.find(j => j.key === t.jar)?.label}
                </div>
                {t.note ? <div style={styles.txNote}>{t.note}</div> : null}
              </div>
              <div style={{ ...styles.txAmount, color: t.type === 'income' ? '#0F6E56' : '#993C1D' }}>
                {t.type === 'income' ? '+' : '−'}{fmt(t.amount)}
              </div>
              <button aria-label="Xoá giao dịch" onClick={() => onRemove(t.id)} style={styles.txDelete}>
                <Icon name="trash-2" size={15} strokeWidth={1.8} />
              </button>
            </div>
          ))}
        </div>
      ))}
    </div>
  );
}

function SummaryView({ transactions }) {
  const [mode, setMode] = useState('month');

  const grouped = useMemo(() => {
    const map = {};
    transactions.forEach(t => {
      const key = mode === 'day' ? t.date : mode === 'month' ? monthKey(t.date) : yearKey(t.date);
      if (!map[key]) map[key] = { income: 0, expense: 0 };
      if (t.type === 'income') map[key].income += t.amount;
      else map[key].expense += t.amount;
    });
    return Object.entries(map).sort((a, b) => (a[0] < b[0] ? 1 : -1));
  }, [transactions, mode]);

  if (transactions.length === 0) {
    return <EmptyState text="Chưa có dữ liệu để tổng hợp. Hãy nhập thu nhập hoặc chi tiêu trước." />;
  }

  return (
    <div>
      <div style={styles.modeRow}>
        {[['day', 'Theo ngày'], ['month', 'Theo tháng'], ['year', 'Theo năm']].map(([k, label]) => (
          <button key={k} onClick={() => setMode(k)} style={{ ...styles.modeBtn, ...(mode === k ? styles.modeBtnActive : {}) }}>
            {label}
          </button>
        ))}
      </div>

      {grouped.map(([key, vals]) => {
        const net = vals.income - vals.expense;
        const max = Math.max(vals.income, vals.expense, 1);
        return (
          <div key={key} style={styles.summaryCard}>
            <div style={styles.summaryHeader}>
              <span style={styles.summaryKey}>{formatGroupKey(key, mode)}</span>
              <span style={{ ...styles.summaryNet, color: net >= 0 ? '#0F6E56' : '#993C1D' }}>
                {net >= 0 ? '+' : ''}{fmt(net)}
              </span>
            </div>
            <div className="summaryGrid" style={styles.summaryGrid}>
              <div>
                <div style={styles.barLabel}>
                  <Icon name="trending-up" size={13} strokeWidth={1.8} color="#0F6E56" />
                  <span>Thu nhập</span>
                </div>
                <div style={styles.barTrack}>
                  <div style={{ ...styles.barFill, width: `${(vals.income / max) * 100}%`, background: '#5DCAA5' }} />
                </div>
                <div style={styles.barValue}>{fmt(vals.income)}</div>
              </div>
              <div>
                <div style={styles.barLabel}>
                  <Icon name="trending-up" size={13} strokeWidth={1.8} color="#993C1D" style={{ transform: 'rotate(180deg)' }} />
                  <span>Chi tiêu</span>
                </div>
                <div style={styles.barTrack}>
                  <div style={{ ...styles.barFill, width: `${(vals.expense / max) * 100}%`, background: '#F0997B' }} />
                </div>
                <div style={styles.barValue}>{fmt(vals.expense)}</div>
              </div>
            </div>
          </div>
        );
      })}
    </div>
  );
}

function EmptyState({ text }) {
  return (
    <div style={styles.emptyState}>
      <Icon name="wallet" size={32} strokeWidth={1.3} color="#B4B2A9" />
      <p style={styles.emptyText}>{text}</p>
    </div>
  );
}

function IncomeModal({ onClose, onSubmit }) {
  const [source, setSource] = useState('Lương');
  const [customLabel, setCustomLabel] = useState('');
  const [amount, setAmount] = useState('');
  const [dailyAmount, setDailyAmount] = useState('');
  const [date, setDate] = useState(todayStr());
  const [note, setNote] = useState('');
  const [error, setError] = useState('');

  const amt = parseFloat(amount) || 0;
  const daily = parseFloat(dailyAmount) || 0;
  const rest = Math.max(amt - daily, 0);

  function handleSubmit() {
    if (amt <= 0) { setError('Vui lòng nhập số tiền thu nhập lớn hơn 0.'); return; }
    if (daily > amt) { setError('Chi tiêu hàng ngày không được lớn hơn thu nhập.'); return; }
    onSubmit({ source, customLabel, amount: amt, dailyAmount: daily, date, note });
  }

  return (
    <ModalShell title="Thêm thu nhập" onClose={onClose} accent="#0F6E56">
      <div>
        <Field label="Nguồn thu nhập">
          <div style={styles.chipRow}>
            {INCOME_SOURCES.map(s => (
              <button type="button" key={s} onClick={() => setSource(s)} style={{ ...styles.chip, ...(source === s ? styles.chipActiveIncome : {}) }}>
                {s}
              </button>
            ))}
          </div>
        </Field>

        {source === 'Khác' && (
          <Field label="Ghi rõ nguồn">
            <input type="text" value={customLabel} onChange={e => setCustomLabel(e.target.value)} placeholder="Ví dụ: tiền cho thuê nhà" style={styles.input} />
          </Field>
        )}

        <Field label="Ngày nhận">
          <input type="date" value={date} onChange={e => setDate(e.target.value)} style={styles.input} />
        </Field>

        <Field label="Số tiền thu nhập">
          <input type="number" inputMode="numeric" min="0" value={amount} onChange={e => setAmount(e.target.value)} placeholder="0" style={styles.input} />
        </Field>

        <Field label="Chi tiêu hàng ngày dự kiến (trừ trước khỏi thu nhập)">
          <input type="number" inputMode="numeric" min="0" value={dailyAmount} onChange={e => setDailyAmount(e.target.value)} placeholder="0" style={styles.input} />
        </Field>

        <Field label="Ghi chú (tuỳ chọn)">
          <input type="text" value={note} onChange={e => setNote(e.target.value)} placeholder="Ví dụ: lương tháng 6" style={styles.input} />
        </Field>

        {amt > 0 && (
          <div style={styles.previewBox}>
            <div style={styles.previewTitle}>Phân bổ dự kiến</div>
            <PreviewRow label="Chi tiêu hàng ngày" value={daily} color="#B45309" />
            <PreviewRow label="Khác (còn lại)" value={rest} color="#5F5E5A" bold />
            <PreviewRow label="— Tiết kiệm (30%)" value={rest * 0.3} color="#0F6E56" indent />
            <PreviewRow label="— Đầu tư bản thân (30%)" value={rest * 0.3} color="#185FA5" indent />
            <PreviewRow label="— Ma chay cưới hỏi (15%)" value={rest * 0.15} color="#993556" indent />
            <PreviewRow label="— Chi tiêu (20%)" value={rest * 0.2} color="#993C1D" indent />
            <PreviewRow label="— Từ thiện (5%)" value={rest * 0.05} color="#534AB7" indent />
          </div>
        )}

        {error && <div style={styles.errorText}>{error}</div>}

        <button type="button" onClick={handleSubmit} style={{ ...styles.submitBtn, background: '#0F6E56' }}>Lưu thu nhập</button>
      </div>
    </ModalShell>
  );
}

function ExpenseModal({ balances, onClose, onSubmit }) {
  const [jar, setJar] = useState('daily');
  const [amount, setAmount] = useState('');
  const [date, setDate] = useState(todayStr());
  const [note, setNote] = useState('');
  const [error, setError] = useState('');

  const amt = parseFloat(amount) || 0;
  const jarInfo = JARS.find(j => j.key === jar);
  const currentBalance = balances[jar] || 0;
  const willBeNegative = amt > currentBalance;

  function handleSubmit() {
    if (amt <= 0) { setError('Vui lòng nhập số tiền chi tiêu lớn hơn 0.'); return; }
    onSubmit({ jar, amount: amt, date, note });
  }

  return (
    <ModalShell title="Thêm chi tiêu" onClose={onClose} accent="#993C1D">
      <div>
        <Field label="Rút từ hũ nào">
          <div style={styles.jarSelectGrid}>
            {JARS.map(j => (
              <button type="button" key={j.key} onClick={() => setJar(j.key)}
                style={{ ...styles.jarSelectBtn, borderColor: jar === j.key ? j.color : j.ring, background: jar === j.key ? j.bg : '#fff' }}>
                <span style={{ ...styles.jarSelectDot, background: j.color }} />
                <span style={styles.jarSelectLabel}>{j.label}</span>
                <span style={{ ...styles.jarSelectBalance, color: j.color }}>{fmt(balances[j.key])}</span>
              </button>
            ))}
          </div>
        </Field>

        <Field label="Ngày chi">
          <input type="date" value={date} onChange={e => setDate(e.target.value)} style={styles.input} />
        </Field>

        <Field label="Số tiền chi tiêu">
          <input type="number" inputMode="numeric" min="0" value={amount} onChange={e => setAmount(e.target.value)} placeholder="0" style={styles.input} />
        </Field>

        <Field label="Ghi chú (tuỳ chọn)">
          <input type="text" value={note} onChange={e => setNote(e.target.value)} placeholder="Ví dụ: ăn trưa, xăng xe" style={styles.input} />
        </Field>

        {amt > 0 && (
          <div style={{ ...styles.previewBox, borderColor: willBeNegative ? '#F0997B' : jarInfo.ring }}>
            <PreviewRow label={`Số dư hũ "${jarInfo.label}" hiện tại`} value={currentBalance} color={jarInfo.color} />
            <PreviewRow label="Sau khi chi" value={currentBalance - amt} color={willBeNegative ? '#993C1D' : jarInfo.color} bold />
            {willBeNegative && <div style={styles.warnText}>Hũ này sẽ bị âm sau giao dịch. Bạn vẫn có thể tiếp tục lưu nếu muốn.</div>}
          </div>
        )}

        {error && <div style={styles.errorText}>{error}</div>}

        <button type="button" onClick={handleSubmit} style={{ ...styles.submitBtn, background: '#993C1D' }}>Lưu chi tiêu</button>
      </div>
    </ModalShell>
  );
}

function ModalShell({ title, accent, onClose, children }) {
  return (
    <div style={styles.modalOverlay} onClick={onClose}>
      <div style={styles.modalCard} onClick={e => e.stopPropagation()}>
        <div style={styles.modalHeader}>
          <h2 style={{ ...styles.modalTitle, color: accent }}>{title}</h2>
          <button aria-label="Đóng" onClick={onClose} style={styles.closeBtn}><Icon name="x" size={18} strokeWidth={1.8} /></button>
        </div>
        <div style={styles.modalBody}>{children}</div>
      </div>
    </div>
  );
}

function Field({ label, children }) {
  return (
    <div style={styles.field}>
      <label style={styles.fieldLabel}>{label}</label>
      {children}
    </div>
  );
}

function PreviewRow({ label, value, color, bold, indent }) {
  return (
    <div style={{ display: 'flex', justifyContent: 'space-between', padding: '3px 0', paddingLeft: indent ? 12 : 0 }}>
      <span style={{ fontSize: 13, color: '#5F5E5A', fontWeight: bold ? 500 : 400 }}>{label}</span>
      <span style={{ fontSize: 13, color, fontWeight: bold ? 500 : 400 }}>{fmt(value)}</span>
    </div>
  );
}

function formatDateVN(dateStr) {
  const [y, m, d] = dateStr.split('-');
  return `${d}/${m}/${y}`;
}

function formatGroupKey(key, mode) {
  if (mode === 'day') {
    const [y, m, d] = key.split('-');
    return `${d}/${m}/${y}`;
  }
  if (mode === 'month') {
    const [y, m] = key.split('-');
    return `Tháng ${parseInt(m)}/${y}`;
  }
  return `Năm ${key}`;
}
